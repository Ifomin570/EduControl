<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduControl — Учительская</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Специфические стили для учителя */
        .teacher-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 25px;
        }

        .class-selector {
            background: white;
            border: 6px solid #95a5a6;
            border-radius: 40px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .class-selector h2 {
            margin-bottom: 20px;
            color: #2d3436;
        }

        .class-row {
            display: flex;
            gap: 20px;
            margin: 15px 0;
            align-items: center;
        }

        .class-number-select, .class-letter-select {
            flex: 1;
            padding: 20px;
            font-size: 1.2rem;
            font-family: 'Comfortaa', cursive;
            font-weight: 700;
            border: 4px solid #f1f2f6;
            border-radius: 30px;
            background: white;
            cursor: pointer;
        }

        .class-number-select:focus, .class-letter-select:focus {
            outline: none;
            border-color: #95a5a6;
        }

        .selected-class-display {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 900;
            color: #95a5a6;
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: white;
            border: 4px solid #95a5a6;
            border-radius: 30px;
            padding: 25px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 900;
            color: #95a5a6;
        }

        .template-card {
            background: white;
            border: 5px solid #95a5a6;
            border-radius: 35px;
            padding: 30px;
            margin-bottom: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .template-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .template-card.selected {
            border-color: #00b894;
            background: #f0fff9;
        }

        .question-preview {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 15px;
            margin: 10px 0;
            font-size: 0.9rem;
        }

        .bottom-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d3436;
            padding: 20px 40px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        /* Поле для названия теста */
        .test-name-input {
            width: 100%;
            padding: 25px 30px;
            font-size: 1.5rem;
            font-family: 'Comfortaa', cursive;
            font-weight: 900;
            border: 6px solid #95a5a6;
            border-radius: 50px;
            margin-bottom: 30px;
            text-align: center;
            background: #fff9e6;
            color: #2d3436;
            box-shadow: 0 10px 0 #95a5a6;
            transition: all 0.3s ease;
        }

        .test-name-input:focus {
            outline: none;
            transform: translateY(-5px);
            box-shadow: 0 15px 0 #95a5a6;
            background: #fff;
        }

        .test-name-input::placeholder {
            color: #b2bec3;
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* Серая шапка для учителя с тёмными кнопками */
        .teacher-page .main-header {
            background: #7f8c8d !important;
            border-bottom: 6px solid #95a5a6 !important;
        }

        .teacher-page .app-logo {
            color: #2c3e50 !important;
            text-shadow: 0 3px 0px #bdc3c7 !important;
            font-weight: 900;
        }

        .teacher-page .user-block {
            background: #34495e !important;
            border: 2px solid #2c3e50 !important;
        }

        .teacher-page .user-block:hover {
            background: #2c3e50 !important;
        }

        .teacher-page .user-info span {
            color: #ecf0f1 !important;
            font-weight: 900;
        }

        .teacher-page .user-icon-circle {
            border-color: #2c3e50 !important;
            background: #ecf0f1 !important;
            color: #2c3e50 !important;
            font-weight: 900;
        }

        .teacher-page .profile-dropdown button {
            color: #2c3e50;
            font-weight: 700;
        }

        .teacher-page .profile-dropdown button:hover {
            background: #7f8c8d;
            color: white;
        }

        /* Убираем возможные переопределения */
        .teacher-page .main-header,
        body.teacher-page .main-header,
        html body.teacher-page .main-header {
            background: #7f8c8d !important;
        }

        /* Буквы русского алфавита */
        .class-letter-select option {
            font-size: 1.1rem;
        }

        /* Кнопки в нижней панели */
        .bottom-panel button {
            font-weight: 900;
            box-shadow: 0 5px 0 #2c3e50;
        }

        .bottom-panel button:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        /* Стили для кнопок добавления вопросов */
        .question-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn-question {
            padding: 12px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Comfortaa', cursive;
            transition: all 0.3s ease;
        }
        
        .btn-question:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-text {
            background: #f1f2f6;
            color: #2d3436;
        }
        
        .btn-number {
            background: #f1f2f6;
            color: #2d3436;
        }
        
        .btn-choice {
            background: #e3f2fd;
            border: 2px solid #64b5f6;
            color: #1976d2;
        }
        
        .btn-multiple {
            background: #fff3e0;
            border: 2px solid #ffb74d;
            color: #f57c00;
        }
    </style>
</head>
<body class="teacher-page">

    <div id="drop-anim"></div>

    <header class="main-header">
        <div class="app-logo">EduControl ✨</div>
        <div class="user-block" onclick="toggleProfile()">
            <div class="user-info">
                <span id="t-h-name">Учитель</span>
            </div>
            <div class="user-icon-circle" id="h-initials"></div>

            <div id="dropdown" class="profile-dropdown">
                <button onclick="startAvatarAnim()">✨ Сменить аватарку</button>
                <button onclick="logout()" style="color: #e74c3c;">🚪 Выйти</button>
            </div>
        </div>
    </header>

    <div class="teacher-container">
        <!-- Выбор класса (номер + буква) -->
        <div class="class-selector">
            <h2>📋 Выберите класс</h2>
            
            <div class="class-row">
                <select id="class-number" class="class-number-select" onchange="updateClassDisplay()">
                    <option value="5">5</option>
                    <option value="6" selected>6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                </select>

                <select id="class-letter" class="class-letter-select" onchange="updateClassDisplay()">
                    <option value="А">А</option>
                    <option value="Б" selected>Б</option>
                    <option value="В">В</option>
                    <option value="Г">Г</option>
                    <option value="Д">Д</option>
                    <option value="Е">Е</option>
                    <option value="Ё">Ё</option>
                    <option value="Ж">Ж</option>
                    <option value="З">З</option>
                    <option value="И">И</option>
                    <option value="Й">Й</option>
                    <option value="К">К</option>
                    <option value="Л">Л</option>
                    <option value="М">М</option>
                    <option value="Н">Н</option>
                    <option value="О">О</option>
                    <option value="П">П</option>
                    <option value="Р">Р</option>
                    <option value="С">С</option>
                    <option value="Т">Т</option>
                    <option value="У">У</option>
                    <option value="Ф">Ф</option>
                    <option value="Х">Х</option>
                    <option value="Ц">Ц</option>
                    <option value="Ч">Ч</option>
                    <option value="Ш">Ш</option>
                    <option value="Щ">Щ</option>
                    <option value="Ъ">Ъ</option>
                    <option value="Ы">Ы</option>
                    <option value="Ь">Ь</option>
                    <option value="Э">Э</option>
                    <option value="Ю">Ю</option>
                    <option value="Я">Я</option>
                </select>
            </div>

            <div id="selected-class" class="selected-class-display">
                Выбран: 6Б
            </div>
        </div>

        <!-- Статистика класса -->
        <div class="stats-grid" id="class-stats">
            <div class="stat-card">
                <div class="stat-number" id="students-count">0</div>
                <div>Учеников</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="tests-count">0</div>
                <div>Тестов выдано</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completed-count">0</div>
                <div>Выполнено</div>
            </div>
        </div>

        <!-- Создание нового теста -->
        <h2 style="margin: 40px 0 20px;">✏️ Создать новый тест</h2>
        
        <!-- Поле для названия теста -->
        <input type="text" id="test-name-input" class="test-name-input" 
               placeholder="Введите название теста (например: «Математика - Дроби»)" 
               value="Новый тест">

        <div id="master-editor">
            <!-- Сюда будут добавляться темы -->
        </div>

        <button class="primary" onclick="createNewTopic()" style="margin: 20px 0; background: #7f8c8d;">
            + Добавить тему
        </button>

        <!-- Сохраненные шаблоны -->
        <h2 style="margin: 40px 0 20px;">📚 Сохраненные шаблоны</h2>
        <div id="templates-list"></div>
    </div>

    <!-- Нижняя панель с кнопками -->
    <div class="bottom-panel">
        <button class="primary" onclick="saveAsTemplate()" style="width: auto; padding: 15px 30px; background: #27ae60;">
            💾 Сохранить шаблон
        </button>
        <button class="primary" onclick="publishTest()" style="width: auto; padding: 15px 30px; background: #2980b9;">
            📢 Опубликовать для класса
        </button>
    </div>

    <!-- Модалка аватарки -->
    <div id="avatar-modal" class="modal">
        <div class="modal-content">
            <h2>Твой стиль 🎨</h2>
            <div class="avatar-grid">
                <button onclick="setAvatar('👨‍🏫')">👨‍🏫</button>
                <button onclick="setAvatar('👩‍🏫')">👩‍🏫</button>
                <button onclick="setAvatar('📚')">📚</button>
                <button onclick="setAvatar('✏️')">✏️</button>
                <button onclick="setAvatar('🎓')">🎓</button>
                <button onclick="setAvatar('⭐')">⭐</button>
            </div>
            <p>Или загрузи своё фото:</p>
            <input type="file" id="file-up" hidden accept="image/*" onchange="uploadPhoto(this)">
            <button class="primary" onclick="document.getElementById('file-up').click()">Выбрать файл</button>
            <button onclick="closeAvatarModal()" style="background:none; border:none; margin-top:20px;">Закрыть</button>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        // Глобальные переменные
        let currentTestModules = [];
        let savedTemplates = JSON.parse(localStorage.getItem('edu_templates')) || [];

        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            if (document.getElementById('t-h-name')) {
                document.getElementById('t-h-name').innerText = currentUser.name;
            }
            updateClassDisplay();
            updateClassStats();
            renderTemplates();
            loadAvatarUI();
            
            // Проверяем, что все функции загружены
            console.log('Функции доступны:', {
                addChoiceQuestion: typeof addChoiceQuestion,
                addMultipleChoiceQuestion: typeof addMultipleChoiceQuestion,
                addQuestion: typeof addQuestion,
                toggleCorrect: typeof toggleCorrect,
                toggleMultipleCorrect: typeof toggleMultipleCorrect
            });
        });

        // Обновление отображения выбранного класса
        function updateClassDisplay() {
            const number = document.getElementById('class-number').value;
            const letter = document.getElementById('class-letter').value;
            const display = document.getElementById('selected-class');
            display.textContent = `Выбран: ${number}${letter}`;
            updateClassStats();
        }

        // Получение полного названия класса
        function getSelectedClass() {
            const number = document.getElementById('class-number').value;
            const letter = document.getElementById('class-letter').value;
            return number + letter;
        }

        // Функция создания новой темы
        function createNewTopic() {
            const container = document.getElementById('master-editor');
            const currentCount = document.querySelectorAll('.topic-card').length;
            
            if (currentCount >= 15) {
                alert("Максимум 15 тем!");
                return;
            }

            const topicId = Date.now();
            const topicHtml = `
                <div class="topic-card" id="topic-${topicId}" style="background:white; border-radius:40px; padding:30px; margin-bottom:30px; border:4px solid #95a5a6;">
                    <div style="display:flex; gap:20px; align-items:center; margin-bottom:25px;">
                        <div style="background:#95a5a6; color:white; width:40px; height:40px; border-radius:15px; display:flex; align-items:center; justify-content:center; font-weight:900;">${currentCount+1}</div>
                        <input type="text" class="topic-title" placeholder="Название темы..." style="flex:1; border:none; border-bottom:3px solid #eee; font-size:1.4rem; font-weight:800; outline:none;">
                        <button onclick="this.closest('.topic-card').remove()" style="background:none; border:none; cursor:pointer; font-size:1.5rem;">🗑️</button>
                    </div>
                    <div class="questions-list" id="qlist-${topicId}"></div>
                    <div class="question-buttons">
                        <button onclick="addQuestion(${topicId}, 'text')" class="btn-question btn-text">📝 Текст</button>
                        <button onclick="addQuestion(${topicId}, 'number')" class="btn-question btn-number">🔢 Число</button>
                        <button onclick="addChoiceQuestion(${topicId})" class="btn-question btn-choice">🔘 Выбор (1 ответ)</button>
                        <button onclick="addMultipleChoiceQuestion(${topicId})" class="btn-question btn-multiple">🔲 Выбор (несколько)</button>
                    </div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', topicHtml);
        }

        // Функция сбора данных теста
        function collectTestData() {
            const topics = [];
            const topicCards = document.querySelectorAll('.topic-card');
            
            topicCards.forEach(card => {
                const title = card.querySelector('.topic-title')?.value.trim();
                if (!title) return;
                
                const questions = [];
                const questionItems = card.querySelectorAll('.question-item');
                
                questionItems.forEach(item => {
                    if (item.classList.contains('choice-item')) {
                        const questionText = item.querySelector('.q-text')?.value.trim();
                        const optionInputs = item.querySelectorAll('.choice-option');
                        const checkboxes = item.querySelectorAll('.correct-checkbox');
                        
                        const options = [];
                        let correctIndex = -1;
                        
                        optionInputs.forEach((input, index) => {
                            const value = input.value.trim();
                            if (value) {
                                options.push(value);
                                if (checkboxes[index] && checkboxes[index].innerHTML === '✓') {
                                    correctIndex = index;
                                }
                            }
                        });
                        
                        if (questionText && options.length >= 2 && correctIndex !== -1) {
                            questions.push({
                                t: questionText,
                                type: 'choice',
                                options: options,
                                a: correctIndex.toString()
                            });
                        }
                    } else if (item.classList.contains('multiple-choice-item')) {
                        const questionText = item.querySelector('.q-text')?.value.trim();
                        const optionInputs = item.querySelectorAll('.choice-option');
                        const checkboxes = item.querySelectorAll('.correct-checkbox');
                        
                        const options = [];
                        const correctIndices = [];
                        
                        optionInputs.forEach((input, index) => {
                            const value = input.value.trim();
                            if (value) {
                                options.push(value);
                                if (checkboxes[index] && checkboxes[index].innerHTML === '✓') {
                                    correctIndices.push(index);
                                }
                            }
                        });
                        
                        if (questionText && options.length >= 2 && correctIndices.length > 0) {
                            questions.push({
                                t: questionText,
                                type: 'multiple',
                                options: options,
                                a: correctIndices.sort().join(',')
                            });
                        }
                    } else {
                        const questionText = item.querySelector('.q-text')?.value.trim();
                        const answer = item.querySelector('.q-answer')?.value.trim();
                        
                        if (questionText && answer) {
                            questions.push({
                                t: questionText,
                                a: answer
                            });
                        }
                    }
                });
                
                if (questions.length > 0) {
                    topics.push({
                        title: title,
                        qs: questions
                    });
                }
            });
            
            return topics;
        }

        // Функция сохранения как шаблон
        function saveAsTemplate() {
            const modules = collectTestData();
            
            if (modules.length === 0) {
                alert("Добавьте хотя бы одну тему с вопросами!");
                return;
            }
            
            const testName = document.getElementById('test-name-input').value.trim() || "Новый шаблон";
            
            const template = {
                id: Date.now(),
                name: testName,
                modules: modules,
                author: currentUser.name,
                created: new Date().toLocaleDateString()
            };
            
            savedTemplates.push(template);
            localStorage.setItem('edu_templates', JSON.stringify(savedTemplates));
            renderTemplates();
            alert("Шаблон сохранен!");
        }

        // Функция публикации теста
        function publishTest() {
            const targetClass = getSelectedClass();
            const modules = collectTestData();
            
            if (modules.length === 0) {
                alert("Создайте хотя бы одну тему с вопросами!");
                return;
            }
            
            const testName = document.getElementById('test-name-input').value.trim();
            if (!testName) {
                alert("Введите название теста!");
                document.getElementById('test-name-input').focus();
                return;
            }
            
            let assignedTests = JSON.parse(localStorage.getItem('edu_assigned')) || [];
            
            const newTest = {
                id: Date.now(),
                author: currentUser.name,
                target: targetClass,
                topic: testName,
                modules: modules,
                created: new Date().toISOString()
            };
            
            assignedTests.push(newTest);
            localStorage.setItem('edu_assigned', JSON.stringify(assignedTests));
            
            alert(`✅ Тест "${testName}" опубликован для класса ${targetClass}`);
            
            document.getElementById('master-editor').innerHTML = '';
            document.getElementById('test-name-input').value = 'Новый тест';
            
            updateClassStats();
        }

        // Функция загрузки шаблона
        function loadTemplate(templateId) {
            const template = savedTemplates.find(t => t.id === templateId);
            if (!template) return;
            
            document.getElementById('test-name-input').value = template.name;
            document.getElementById('master-editor').innerHTML = '';
            
            template.modules.forEach((module, index) => {
                const topicId = Date.now() + index;
                const topicHtml = `
                    <div class="topic-card" id="topic-${topicId}" style="background:white; border-radius:40px; padding:30px; margin-bottom:30px; border:4px solid #95a5a6;">
                        <div style="display:flex; gap:20px; align-items:center; margin-bottom:25px;">
                            <div style="background:#95a5a6; color:white; width:40px; height:40px; border-radius:15px; display:flex; align-items:center; justify-content:center; font-weight:900;">${index+1}</div>
                            <input type="text" class="topic-title" value="${module.title}" style="flex:1; border:none; border-bottom:3px solid #eee; font-size:1.4rem; font-weight:800; outline:none;">
                            <button onclick="this.closest('.topic-card').remove()" style="background:none; border:none; cursor:pointer; font-size:1.5rem;">🗑️</button>
                        </div>
                        <div class="questions-list" id="qlist-${topicId}"></div>
                        <div class="question-buttons">
                            <button onclick="addQuestion(${topicId}, 'text')" class="btn-question btn-text">📝 Текст</button>
                            <button onclick="addQuestion(${topicId}, 'number')" class="btn-question btn-number">🔢 Число</button>
                            <button onclick="addChoiceQuestion(${topicId})" class="btn-question btn-choice">🔘 Выбор (1 ответ)</button>
                            <button onclick="addMultipleChoiceQuestion(${topicId})" class="btn-question btn-multiple">🔲 Выбор (несколько)</button>
                        </div>
                    </div>
                `;
                
                document.getElementById('master-editor').insertAdjacentHTML('beforeend', topicHtml);
                
                const questionsList = document.getElementById(`qlist-${topicId}`);
                module.qs.forEach(q => {
                    if (q.type === 'choice') {
                        const questionHtml = `
                            <div class="question-item choice-item" style="background:#f8f9fa; border-radius:20px; padding:20px; margin-bottom:15px; border-left:8px solid #64b5f6;">
                                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                                    <span style="font-weight:700; color:#1976d2;">🔘 Вопрос с выбором (1 ответ)</span>
                                    <button onclick="this.closest('.question-item').remove()" style="background:none; border:none; cursor:pointer;">❌</button>
                                </div>
                                <input type="text" class="q-text" value="${q.t}" style="width:100%; padding:12px; border:2px solid #eee; border-radius:15px; margin-bottom:15px;">
                                
                                <div style="margin-bottom:15px;">
                                    ${q.options.map((opt, optIndex) => `
                                        <div style="display:flex; gap:10px; margin-bottom:10px; align-items:center;">
                                            <input type="text" class="choice-option" value="${opt}" style="flex:1; padding:10px; border:2px solid #eee; border-radius:12px;">
                                            <div class="correct-checkbox" onclick="toggleCorrect(this)" style="width:30px; height:30px; border:3px solid #00b894; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:20px; color:#00b894; ${optIndex == q.a ? 'background-color:#00b894; color:white;' : ''}">${optIndex == q.a ? '✓' : ''}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                        questionsList.insertAdjacentHTML('beforeend', questionHtml);
                    } else if (q.type === 'multiple') {
                        const correctIndices = q.a.split(',').map(Number);
                        const questionHtml = `
                            <div class="question-item multiple-choice-item" style="background:#f8f9fa; border-radius:20px; padding:20px; margin-bottom:15px; border-left:8px solid #ffb74d;">
                                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                                    <span style="font-weight:700; color:#f57c00;">🔲 Вопрос с выбором (несколько ответов)</span>
                                    <button onclick="this.closest('.question-item').remove()" style="background:none; border:none; cursor:pointer;">❌</button>
                                </div>
                                <input type="text" class="q-text" value="${q.t}" style="width:100%; padding:12px; border:2px solid #eee; border-radius:15px; margin-bottom:15px;">
                                
                                <div style="margin-bottom:15px;">
                                    ${q.options.map((opt, optIndex) => `
                                        <div style="display:flex; gap:10px; margin-bottom:10px; align-items:center;">
                                            <input type="text" class="choice-option" value="${opt}" style="flex:1; padding:10px; border:2px solid #eee; border-radius:12px;">
                                            <div class="correct-checkbox" onclick="toggleMultipleCorrect(this)" style="width:30px; height:30px; border:3px solid #f57c00; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:20px; color:#f57c00; ${correctIndices.includes(optIndex) ? 'background-color:#f57c00; color:white;' : ''}">${correctIndices.includes(optIndex) ? '✓' : ''}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                        questionsList.insertAdjacentHTML('beforeend', questionHtml);
                    } else {
                        const questionHtml = `
                            <div class="question-item" style="background:#f8f9fa; border-radius:20px; padding:20px; margin-bottom:15px;">
                                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                                    <span style="font-weight:700; color:#95a5a6;">📝 Текст</span>
                                    <button onclick="this.closest('.question-item').remove()" style="background:none; border:none; cursor:pointer;">❌</button>
                                </div>
                                <input type="text" class="q-text" value="${q.t}" style="width:100%; padding:12px; border:2px solid #eee; border-radius:15px; margin-bottom:10px;">
                                <input type="text" class="q-answer" value="${q.a}" style="width:100%; padding:12px; border:2px solid #00b894; border-radius:15px;">
                            </div>
                        `;
                        questionsList.insertAdjacentHTML('beforeend', questionHtml);
                    }
                });
            });
        }

        // Функция отображения шаблонов
        function renderTemplates() {
            const list = document.getElementById('templates-list');
            
            if (savedTemplates.length === 0) {
                list.innerHTML = '<p style="text-align:center; opacity:0.5; padding:40px;">Нет сохраненных шаблонов</p>';
                return;
            }
            
            list.innerHTML = savedTemplates.map(t => `
                <div class="template-card" onclick="loadTemplate(${t.id})">
                    <h3 style="margin:0 0 10px; color:#95a5a6;">${t.name}</h3>
                    <div style="display:flex; gap:15px; color:#666; font-size:0.9rem; margin-bottom:10px;">
                        <span>Тем: ${t.modules.length}</span>
                        <span>Вопросов: ${t.modules.reduce((sum, m) => sum + m.qs.length, 0)}</span>
                    </div>
                    <div style="font-size:0.8rem; opacity:0.5;">${t.created}</div>
                </div>
            `).join('');
        }

        // Функция обновления статистики класса
        function updateClassStats() {
            const selectedClass = getSelectedClass();
            
            const students = DB_STUDENTS.filter(s => {
                const parts = s.split('/');
                return parts[2] === selectedClass;
            });
            document.getElementById('students-count').innerText = students.length;
            
            const assignedTests = JSON.parse(localStorage.getItem('edu_assigned')) || [];
            const classTests = assignedTests.filter(t => t.target === selectedClass);
            document.getElementById('tests-count').innerText = classTests.length;
            
            let completed = 0;
            students.forEach(s => {
                const name = s.split('/')[0];
                const completedTests = JSON.parse(localStorage.getItem(`comp_${name}`)) || [];
                completed += completedTests.length;
            });
            document.getElementById('completed-count').innerText = completed;
        }

        // Функции для аватарки
        function closeAvatarModal() {
            document.getElementById('avatar-modal').classList.remove('active');
        }
    </script>
</body>
</html>
